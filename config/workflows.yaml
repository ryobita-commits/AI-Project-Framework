version: 1

superpowers_alignment:
  adopted_from:
    - "brainstorming"
    - "writing-plans"
    - "subagent-driven-development"
    - "test-driven-development"
    - "requesting-code-review"
    - "verification-before-completion"
    - "systematic-debugging"
  mapping_doc: "docs/superpowers-mapping.md"
  required_outputs:
    - "design spec for non-trivial changes"
    - "implementation plan for non-trivial execution"
    - "verification evidence before completion"

feedback_loop:
  phases:
    - "detect"
    - "record"
    - "triage"
    - "approve"
    - "replan"
    - "implement"
    - "verify"
    - "close"

  detect:
    actors:
      - "product_director"
      - "game_designer"
      - "system_architect"
      - "client_dev"
      - "server_dev"
      - "qa_planner"
      - "test_automation"
      - "release_manager"
    output: "feedback/inbox/<date>-<slug>.md"
    required_fields:
      - "summary"
      - "type"
      - "source_phase"
      - "detected_by"
      - "severity"
      - "impact"
      - "suspected_cause"
      - "proposed_actions"

  triage:
    actor: "pm_triage"
    input: "feedback/inbox/*.md"
    output:
      - "feedback/triaged/<date>-<slug>.md"
      - "plans/change-requests/<date>-<slug>.md"
    actions:
      - "classify issue"
      - "assign owner"
      - "determine approval path"
      - "update CURRENT_STATE.md if work is accepted"

  approve:
    policy_file: "config/authority.yaml"
    outcomes:
      - "auto_execute"
      - "pm_ai_can_approve"
      - "human_approval_required"
      - "record_only"

  human_review_package:
    generated_when: "outcome == human_approval_required"
    output: "plans/change-requests/<date>-<slug>-proposal.md"
    sections_from: "config/authority.yaml#required_human_proposal_sections"

  implement:
    actor_selection: "config/agents.yaml#routing"
    rules:
      - "design or spec context must exist before implementation"
      - "tasks/todo.md must be created or refreshed before implementation"
      - "non-trivial work should have an implementation plan under docs/plans/ or equivalent"
      - "implementation must reference approved change request"
      - "session report is mandatory"
      - "tests must be added or updated for every accepted bug fix"
      - "TDD is the default for behavior changes when practical"

  verify:
    actor: "test_automation"
    required_outputs:
      - "verification result"
      - "regression status"
      - "remaining risks"
      - "tasks/todo.md review section updated"
      - "fresh command evidence for completion claims"

  close:
    done_when:
      - "fix merged or proposal rejected"
      - "verification completed when implementation happened"
      - "tasks/lessons.md updated when reusable lessons were found"
      - "worklog/improvements entry added"
      - "feedback item moved to approved, implemented, rejected, or archived"

logging:
  required_logs:
    - "worklog/daily/"
    - "worklog/improvements/"
    - "docs/decisions/"
    - "docs/superpowers-mapping.md"
    - "tasks/todo.md"
    - "tasks/lessons.md"
  session_report_sections:
    - "summary"
    - "files_changed"
    - "tests_run"
    - "findings"
    - "improvement_opportunities"
    - "recommended_follow_ups"
    - "preventive_actions"
    - "escalations"

planning_updates:
  update_when_accepted:
    - "CURRENT_STATE.md"
    - "STATUS.md"
    - "issues/in-progress.md"
    - "plans/sprint/"
  update_when_architecture_changes:
    - "docs/architecture/**"
    - "docs/decisions/**"
  update_when_design_changes:
    - "docs/design/**"
    - "specs/features/**"

planning_meetings:
  purpose: "Reach a documented decision using PM moderation, advisor debate, and optional human input."
  participants:
    moderator: "pm_moderator"
    advisors:
      - "pm_critic"
      - "pm_advocate"
      - "pm_analyst"
    human: "optional but expected during product planning"
  sequence:
    - "moderator defines the question and success criteria"
    - "analyst summarizes facts, options, and constraints"
    - "advocate argues for promising opportunities and execution paths"
    - "critic challenges assumptions, risks, and hidden costs"
    - "humans add intent, constraints, or preferences"
    - "moderator summarizes agreement, unresolved points, and recommendation"
    - "decision is recorded in meeting notes and escalated if required"
  outputs:
    - "plans/meeting-notes/<date>-<topic>.md"
    - "plans/change-requests/<date>-<topic>.md"
    - "worklog/daily/<date>.md"
  required_sections:
    - "topic"
    - "participants"
    - "decision_question"
    - "shared_goal"
    - "options_considered"
    - "advocate_position"
    - "critic_position"
    - "analyst_position"
    - "human_input"
    - "decision"
    - "rationale"
    - "risks"
    - "next_actions"
