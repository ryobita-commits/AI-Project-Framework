version: 1

decision_authority:
  auto_execute:
    description: "Assigned role may implement directly. PM AI is notified."
    allowed_when:
      - "no gameplay or business rule change"
      - "localized impact"
      - "estimated effort <= 0.5 day"
      - "covered by existing tests or obvious test addition"
      - "no save data migration"
      - "no release-blocking risk"

  pm_ai_can_approve:
    description: "PM AI may approve and re-plan without human review."
    allowed_when:
      - "no product scope expansion"
      - "no monetization or economy change"
      - "no platform compliance impact"
      - "estimated effort <= 2 days"
      - "rollback is straightforward"

  human_approval_required:
    description: "Must generate proposal and wait for a human decision."
    required_when:
      - "core loop changes"
      - "economy or progression changes"
      - "save data/schema changes"
      - "multi-team coordination"
      - "estimated effort > 2 days"
      - "visible release behavior change"
      - "security, privacy, legal, or platform risk"

severity_matrix:
  P0:
    meaning: "Critical"
    examples:
      - "crash or data loss"
      - "save corruption"
      - "cannot progress"
    approval: "human_approval_required"
  P1:
    meaning: "High"
    examples:
      - "major gameplay regression"
      - "release-blocking UX failure"
      - "high-frequency bug"
    approval: "human_approval_required"
  P2:
    meaning: "Medium"
    examples:
      - "contained gameplay bug"
      - "test coverage gap"
      - "moderate tooling issue"
    approval: "pm_ai_can_approve"
  P3:
    meaning: "Low"
    examples:
      - "small defect"
      - "minor documentation mismatch"
      - "localized refactor"
    approval: "auto_execute"
  P4:
    meaning: "Observation"
    examples:
      - "idea"
      - "future improvement"
      - "non-urgent cleanup"
    approval: "record_only"

required_human_proposal_sections:
  - "summary"
  - "background"
  - "improvement"
  - "expected_effect"
  - "benefits"
  - "drawbacks"
  - "risks"
  - "estimated_effort"
  - "affected_areas"
  - "rollback_plan"
  - "recommendation"
